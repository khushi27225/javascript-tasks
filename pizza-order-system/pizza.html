<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza-Order-system</title>
    <link rel="stylesheet" href="pizza.css">
</head>
<body>
    <div class="container">
    <h1>Pizza Order System</h1>
    <input type="search" id="search" placeholder="Search by Customer Name">
    <input type="text" id="fullName" placeholder="Customer Name" required>
    <input type="text" id="pizzaName" placeholder="Pizza Name" required>
    <input type="number" id="quantity" placeholder="Quantity" required>
    <button id="addBtn">Place Order</button>
    <p>Order List:</p>
    <ul id="list"></ul>
    <p id="totalOrder">Total Order:</p>
    <script src="pizza.js"></script>
    </div>
</body>
</html>
