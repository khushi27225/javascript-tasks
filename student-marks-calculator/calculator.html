<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student-marks-calculator</title>
    <link rel="stylesheet" href="calculator.css">
</head>
<body>
    <div class="container">
    <h1>Student Marks Calculator</h1>
    <label for="english" >English:</label>
    <input type="text" id="english">
    <br>
    <label for="math">Math:</label>
    <input type="text" id="math">
    <br>
    <label for="science">Science:</label>
    <input type="text" id="science">
    <br>
    <div class="btn">
    <button id="addBtn">Calculate</button>
    </div>
    <p id="totalMarks">Total Marks:</p>
    <p id="percentage">Percentage:</p>
    <p id="result">Result:</p>
    </div>
    <script src="calculator.js"></script>
</body>
</html>
