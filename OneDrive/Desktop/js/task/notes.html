<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Notes App</title>
    <link rel="stylesheet" href="notes.css">
</head>
<body>
    <h1>Student Notes App</h1>
    <label for="title">Title:</label>
    <input type="Text" id="title">
    <br>
    <label for="description">Description:</label>
    <textarea id="description" name="Description" rows="3" placeholder="Type your description..."></textarea>
    <br>
    <button id="addBtn">Save Notes</button>
    <h2>My Notes</h2>
    <ul id="notesList"></ul>
    <p id="totalNotes">Total Notes:0</p>
    <script src="notes.js"></script>
</body>
</html>
